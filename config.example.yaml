manager:
  api_port: 8080
  log_level: info

proxy:
  listen: ":1080"
  auth:
    enabled: false
    users: []
  timeout:
    connect: 5s
    idle: 30s

scaling:
  min: 3
  max: 10
  cooldown: 60s
  triggers: []

loadbalancer:
  algorithm: roundrobin
  health_check:
    enabled: false

docker:
  image: "ghcr.io/lowkruc/warp-proxy:latest"
  network: "warp-net"
  prefix: "warp-proxy"
  memory_limit: "150m"
  cpu_limit: "0.1"
  env:
    WARP_SLEEP: "5"
    WARP_ROTATION_INTERVAL: "60"
